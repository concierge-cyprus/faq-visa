        const regions = regionLines.map(line => {
            const dashIndex = line.indexOf('—');
            if (dashIndex === -1) {
                return { name: line.trim(), addresses: '' };
            }
            const name = line.substring(0, dashIndex).trim();
            const rawAddresses = line.substring(dashIndex + 1).trim();
            const addresses = rawAddresses.replace(/;\s*/g, '\n').trim();
            return { name, addresses };
        });

        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function linkifyText(text) {
            if (!text) return '';
            // заменяем URL на кликабельные ссылки
            const urlRegex = /(https?:\/\/[^\s<>"']+)/gi;
            return escapeHTML(text).replace(urlRegex, function(url) {
                return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
            });
        }

        function buildRegionSelectorHTML() {
            let options = '<option value="">выберите регион прописки</option>';
            regions.forEach((reg, idx) => {
                options += '<option value="' + idx + '">' + escapeHTML(reg.name) + '</option>';
            });

            return '' +
                '<div class="text-block">Подача документов происходит через центры BLS.\nЕсли вас приглашает родственник гражданин ЕС, то вы имеете право подаваться напрямую в консульство. Для этого позвоните в консульский отдел (для Москвы +74995750300, добавочные 1 и 3 или по кипрскому номеру +35722651501) или пишите на почту gconsul.moscow@mfa.gov.cy и согласовывайте дату и время подачи.\nВНЖ, собственная недвижимость – НЕ дают права подаваться в консульстве.</div>' +
                '<hr>' +
                '<div class="region-selector">' +
                '<select id="regionSelect">' + options + '</select>' +
                '<div class="region-result" id="regionResult"></div>' +
                '</div>';
        }

        function renderFAQ() {
            const container = document.getElementById('faqContainer');
            let html = '';
            faqData.forEach((item, index) => {
                html += '<div class="accordion-item">';
                html += '<button class="accordion-header" data-index="' + index + '">';
                html += '<span>' + escapeHTML(item.title) + '</span>';
                html += '<span class="accordion-icon">+</span>';
                html += '</button>';
                html += '<div class="accordion-body">';
                html += '<div class="accordion-content">';
                if (item.isRegionSelector) {
                    html += buildRegionSelectorHTML();
                } else {
                    html += linkifyText(item.content).replace(/\n/g, '<br>');
                }
                html += '</div>';
                html += '</div>';
                html += '</div>';
            });
            container.innerHTML = html;

            document.querySelectorAll('.accordion-header').forEach(header => {
                header.addEventListener('click', function() {
                    const item = this.closest('.accordion-item');
                    if (!item) return;
                    document.querySelectorAll('.accordion-item').forEach(el => {
                        if (el !== item) el.classList.remove('open');
                    });
                    item.classList.toggle('open');
                });
            });

            const selectEl = document.getElementById('regionSelect');
            const resultEl = document.getElementById('regionResult');
            if (selectEl && resultEl) {
                selectEl.addEventListener('change', function() {
                    const val = this.value;
                    if (val === '') {
                        resultEl.textContent = '';
                        return;
                    }
                    const idx = parseInt(val, 10);
                    if (regions[idx]) {
                        resultEl.textContent = regions[idx].addresses;
                    } else {
                        resultEl.textContent = '';
                    }
                });
            }
        }

        renderFAQ();

    })();
