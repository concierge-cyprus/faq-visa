            overflow: visible;
        }
        .accordion-content {
            padding: 0 0 1.8rem 0;

            color: #1f1f1f;
            white-space: normal;

            line-height: 1.45;
        }
        .accordion-content br {
            display: block;
            content: "";
            margin: 0.3rem 0;
        }
        .accordion-content a {
            color: #0066cc;
            text-decoration: underline;
        }
        .region-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0 0.5rem;
        }
        .region-selector select {
            font-size: 1rem;
            padding: 0.5rem;
            border: 1px solid #aaa;
            border-radius: 6px;
            min-width: 240px;
        }
        .region-result {
            background: #f9f9f9;
            padding: 0.6rem 1rem;
            border-left: 3px solid #ccc;
            white-space: pre-wrap;
            flex: 1;
            min-height: 42px;
        }
        hr {
            margin: 1rem 0;
            border-top: 1px solid #ddd;
        }
        @media (max-width: 550px) {
            .accordion-header {
                font-size: 1.4rem;
            }
            .region-selector {
                flex-direction: column;
            }
            .region-selector select {
                width: 100%;
            }
        }

                    7. Копия банковской выписки приглашающего с детализацией за 3 месяца - не имеет отношение к спонсорству, выписка требуется потому что приглашающий берет на себя финансовую ответственность за ваше поведение на Кипре, в т.ч. за стоимость депортации, тюремного содержания и штрафов.<br><br>
                    Формально, если приглашающий с Кипра является еще и спонсором, отдельное спонсорское заявление не требуется. Но уже были случаи, что в BLS требовали, так что рекомендуем сделать.
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <button class="accordion-header">
                <span>Меня приглашают на Кипр, но приглашающий находится не на Кипре</span>
                <span class="accordion-icon">+</span>
            </button>
            <div class="accordion-body">
                <div class="accordion-content">
                    В таком случае приглашающий может заверить приглашение у любого нотариуса той страны, в которой находится.<br><br>
                    Приглашение для заверения у русского нотариуса должно содержать данные приглашающего, данные приглашаемого, срок действия приглашения, адрес объекта размещения и описание характера отношения приглашающего к этому объекту (арендатор, собственник). Составляется на русском, может называться "Заявление".
                </div>
            </div>
        </div>
    `;

    // Рендер
    const container = document.getElementById('faqRoot');
    container.innerHTML = faqHTML;

    // Аккордеон
    const headers = document.querySelectorAll('.accordion-header');
    headers.forEach(btn => {
        btn.addEventListener('click', function() {
            const parentItem = this.closest('.accordion-item');
            const isOpen = parentItem.classList.contains('open');
            document.querySelectorAll('.accordion-item').forEach(item => item.classList.remove('open'));
            if (!isOpen) parentItem.classList.add('open');
        });
    });

    // Выпадающий список
    const selectEl = document.getElementById('regionSelect');
    const resultDiv = document.getElementById('regionResult');
    if (selectEl && resultDiv) {
        selectEl.addEventListener('change', function() {
            const val = this.value;
            if (!val) {
                resultDiv.textContent = '';
            } else {
                resultDiv.textContent = regionData[val] || '';
            }
        });
    }
</script>
</body>
</html>
